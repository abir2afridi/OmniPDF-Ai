<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>Testing OpenRouter API</h1>
    <button onclick="testAPI()">Test API</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';
            
            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer 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',
                        'Content-Type': 'application/json',
                        'HTTP-Referer': 'https://omnifdf-ai.com',
                        'X-Title': 'OmniPDF AI',
                    },
                    body: JSON.stringify({
                        model: 'z-ai/glm-4.5-air:free',
                        messages: [
                            {
                                role: 'user',
                                content: 'Hello, how are you?'
                            }
                        ],
                        max_tokens: 100,
                        temperature: 0.7,
                    }),
                });

                console.log('Response status:', response.status);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('Response data:', data);
                    resultDiv.innerHTML = `<h2>✅ SUCCESS</h2><p>${data.choices[0]?.message?.content}</p>`;
                } else {
                    const errorText = await response.text();
                    console.error('Error:', errorText);
                    resultDiv.innerHTML = `<h2>❌ ERROR ${response.status}</h2><pre>${errorText}</pre>`;
                }
            } catch (error) {
                console.error('Catch error:', error);
                resultDiv.innerHTML = `<h2>💥 CATCH ERROR</h2><pre>${error.message}</pre>`;
            }
        }
    </script>
</body>
</html>
