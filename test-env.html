<!DOCTYPE html>
<html>
<head>
    <title>Environment Variable Test</title>
</head>
<body>
    <h1>Environment Variable Test</h1>
    <div id="results"></div>
    
    <script type="module">
        const results = document.getElementById('results');
        
        // Test environment variable loading
        console.log('🔍 Testing environment variable loading...');
        const apiKey = import.meta.env.OPENROUTER_API_KEY;
        
        results.innerHTML += `<p>🔑 API Key: ${apiKey ? '✅ Loaded' : '❌ Missing'}</p>`;
        results.innerHTML += `<p>📏 Key Length: ${apiKey?.length || 0}</p>`;
        results.innerHTML += `<p>🔍 Format: ${apiKey?.startsWith('sk-or-') ? '✅ Correct' : '❌ Wrong'}</p>`;
        
        if (!apiKey) {
            results.innerHTML += `<p style="color: red;">❌ API Key is still missing!</p>`;
            return;
        }
        
        // Test API call
        results.innerHTML += `<p>🔄 Testing API call...</p>`;
        
        try {
            const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${apiKey}`,
                    'Content-Type': 'application/json',
                    'HTTP-Referer': 'https://omnipdf-ai.com',
                    'X-Title': 'OmniPDF AI Test',
                },
                body: JSON.stringify({
                    model: 'z-ai/glm-4.5-air:free',
                    messages: [
                        { role: 'user', content: 'Say "Authentication working"' }
                    ],
                    max_tokens: 50,
                }),
            });
            
            console.log('📡 API Response Status:', response.status);
            results.innerHTML += `<p>📡 Response Status: ${response.status}</p>`;
            
            if (response.ok) {
                const data = await response.json();
                const message = data.choices?.[0]?.message?.content;
                console.log('✅ API Success:', message);
                results.innerHTML += `<p style="color: green;">✅ API Success: "${message}"</p>`;
            } else {
                const error = await response.text();
                console.error('❌ API Error:', response.status, error);
                results.innerHTML += `<p style="color: red;">❌ API Error: ${response.status} - ${error}</p>`;
            }
        } catch (error) {
            console.error('❌ Network Error:', error.message);
            results.innerHTML += `<p style="color: red;">❌ Network Error: ${error.message}</p>`;
        }
    </script>
</body>
</html>
